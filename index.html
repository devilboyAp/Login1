<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Enlight | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-circles">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="container">
        <div class="form-box">
            <div class="header">
                <h1>Physio Enlight</h1>
                <p id="form-subtitle">Welcome back! Please enter your details.</p>
            </div>

            <div class="social-auth">
                <button class="social-btn"><i class="fab fa-google"></i></button>
                <button class="social-btn"><i class="fab fa-apple"></i></button>
            </div>

            <div class="divider"><span>OR</span></div>

            <div class="input-group" id="name-group" style="display: none;">
                <i class="fas fa-user"></i>
                <input type="text" id="signup-name" placeholder="Full Name">
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="auth-email" placeholder="Email Address">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="auth-password" placeholder="Password">
            </div>

            <button id="main-btn" onclick="handleAuth()">Sign In</button>

            <footer class="form-footer">
                <p id="toggle-text">Don't have an account? <span onclick="toggleMode()">Create one</span></p>
            </footer>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
